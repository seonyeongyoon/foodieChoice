<h2>하늘색/파란색 계열 컬러 방향</h2>
<p class="subtitle">어떤 톤이 마음에 드세요?</p>

<div class="cards">
  <div class="card" data-choice="sky" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(160deg, #E8F4FD, #BFDFFF); padding: 24px; border-radius: 8px; text-align: center;">
      <div style="background: #fff; border-radius: 10px; padding: 10px 0; box-shadow: 0 2px 12px rgba(100,170,255,0.2);">
        <div style="display:flex; gap:6px; padding: 8px 12px;">
          <div style="flex:1; background:#3B9EFF; color:white; border-radius:6px; padding:8px; font-size:13px; font-weight:600;">☀️ 점심</div>
          <div style="flex:1; background:#E8F4FD; color:#6BB8FF; border-radius:6px; padding:8px; font-size:13px; font-weight:500;">🌙 저녁</div>
        </div>
        <div style="margin: 10px 12px; background: #E8F4FD; border-radius: 50%; width: 120px; height: 120px; margin: 10px auto; display:flex; align-items:center; justify-content:center; border: 3px solid #3B9EFF;">
          <span style="font-size:13px; color:#3B9EFF; font-weight:700;">룰렛</span>
        </div>
        <div style="margin: 10px 12px; background: #F0F8FF; border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 700; color: #1A6FC4;">🍜 짬뽕</div>
      </div>
    </div>
    <div class="card-body">
      <h3>A — 밝은 하늘색</h3>
      <p>연한 하늘색 배경, 파란색 포인트. 가볍고 청량한 느낌.</p>
    </div>
  </div>

  <div class="card" data-choice="ocean" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(160deg, #1A3A6C, #2563EB); padding: 24px; border-radius: 8px; text-align: center;">
      <div style="background: rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 0; border: 1px solid rgba(255,255,255,0.15);">
        <div style="display:flex; gap:6px; padding: 8px 12px;">
          <div style="flex:1; background:#60A5FA; color:#0D1F3C; border-radius:6px; padding:8px; font-size:13px; font-weight:600;">☀️ 점심</div>
          <div style="flex:1; background:rgba(255,255,255,0.1); color:#93C5FD; border-radius:6px; padding:8px; font-size:13px; font-weight:500;">🌙 저녁</div>
        </div>
        <div style="margin: 10px auto; background: rgba(96,165,250,0.15); border-radius: 50%; width: 120px; height: 120px; display:flex; align-items:center; justify-content:center; border: 3px solid #60A5FA;">
          <span style="font-size:13px; color:#93C5FD; font-weight:700;">룰렛</span>
        </div>
        <div style="margin: 10px 12px; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 700; color: #BAE6FD;">🍜 짬뽕</div>
      </div>
    </div>
    <div class="card-body">
      <h3>B — 딥 오션 블루</h3>
      <p>짙은 네이비 배경, 밝은 파란색 포인트. 고급스럽고 차분한 느낌.</p>
    </div>
  </div>

  <div class="card" data-choice="gradient" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(160deg, #EFF6FF, #DBEAFE); padding: 24px; border-radius: 8px; text-align: center;">
      <div style="background: #fff; border-radius: 10px; padding: 10px 0; box-shadow: 0 2px 16px rgba(59,130,246,0.15); border: 1px solid #BFDBFE;">
        <div style="display:flex; gap:6px; padding: 8px 12px;">
          <div style="flex:1; background: linear-gradient(135deg,#38BDF8,#2563EB); color:white; border-radius:6px; padding:8px; font-size:13px; font-weight:600;">☀️ 점심</div>
          <div style="flex:1; background:#EFF6FF; color:#93C5FD; border-radius:6px; padding:8px; font-size:13px; font-weight:500;">🌙 저녁</div>
        </div>
        <div style="margin: 10px auto; background: linear-gradient(135deg,#EFF6FF,#DBEAFE); border-radius: 50%; width: 120px; height: 120px; display:flex; align-items:center; justify-content:center; border: 3px solid #38BDF8;">
          <span style="font-size:13px; color:#2563EB; font-weight:700;">룰렛</span>
        </div>
        <div style="margin: 10px 12px; background: linear-gradient(135deg,#EFF6FF,#DBEAFE); border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 700; color: #1D4ED8;">🍜 짬뽕</div>
      </div>
    </div>
    <div class="card-body">
      <h3>C — 화이트 + 블루 그라데이션</h3>
      <p>흰 배경에 하늘→파랑 그라데이션 포인트. 깔끔하고 모던한 느낌.</p>
    </div>
  </div>
</div>
