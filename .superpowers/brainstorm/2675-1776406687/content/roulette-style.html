<h2>룰렛 형태를 선택해 주세요</h2>
<p class="subtitle">스핀 애니메이션 방식과 표시 형태를 골라주세요</p>

<div class="cards">
  <div class="card" data-choice="wheel" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #F8F9FA; padding: 24px; border-radius: 8px; text-align: center; border: 1px solid #E9ECEF;">
      <div style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #333; margin: 0 auto; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; width: 50%; height: 50%; background: #f0f0f0; border-right: 2px solid #333; border-bottom: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #555; padding: 8px;">짬뽕</div>
        <div style="position: absolute; top: 0; right: 0; width: 50%; height: 50%; background: #e0e0e0; border-left: 2px solid #333; border-bottom: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #555; padding: 8px;">비빔밥</div>
        <div style="position: absolute; bottom: 0; left: 0; width: 50%; height: 50%; background: #d5d5d5; border-right: 2px solid #333; border-top: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #555; padding: 8px;">삼겹살</div>
        <div style="position: absolute; bottom: 0; right: 0; width: 50%; height: 50%; background: #c8c8c8; border-left: 2px solid #333; border-top: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #555; padding: 8px;">라멘</div>
      </div>
      <div style="margin-top: 12px; font-size: 12px; color: #666;">▼ 포인터</div>
      <button style="margin-top: 10px; background: #333; color: white; border: none; border-radius: 6px; padding: 8px 20px; font-size: 13px; cursor: pointer;">돌리기</button>
    </div>
    <div class="card-body">
      <h3>A — 원형 룰렛 휠</h3>
      <p>전통적인 원형 룰렛. 메뉴가 조각으로 나뉘어 화려하게 회전. 시각적 임팩트 강함.</p>
    </div>
  </div>

  <div class="card" data-choice="slot" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #F8F9FA; padding: 24px; border-radius: 8px; text-align: center; border: 1px solid #E9ECEF;">
      <div style="border: 2px solid #333; border-radius: 10px; overflow: hidden; width: 140px; margin: 0 auto;">
        <div style="background: #e9ecef; padding: 6px; font-size: 11px; color: #888; border-bottom: 1px solid #ccc;">비빔밥</div>
        <div style="background: white; padding: 14px; font-size: 16px; font-weight: bold; color: #222; border-bottom: 1px solid #ccc;">🍜 짬뽕</div>
        <div style="background: #e9ecef; padding: 6px; font-size: 11px; color: #888;">삼겹살</div>
      </div>
      <div style="margin-top: 8px; font-size: 11px; color: #888;">← → 스크롤 애니메이션</div>
      <button style="margin-top: 10px; background: #333; color: white; border: none; border-radius: 6px; padding: 8px 20px; font-size: 13px; cursor: pointer;">돌리기</button>
    </div>
    <div class="card-body">
      <h3>B — 슬롯머신 스타일</h3>
      <p>메뉴가 위아래로 빠르게 스크롤되다 멈춤. 깔끔하고 심플하며 모바일에 최적.</p>
    </div>
  </div>

  <div class="card" data-choice="card-flip" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #F8F9FA; padding: 24px; border-radius: 8px; text-align: center; border: 1px solid #E9ECEF;">
      <div style="perspective: 400px; width: 130px; margin: 0 auto;">
        <div style="background: white; border: 2px solid #333; border-radius: 12px; padding: 20px 16px; box-shadow: 4px 4px 0 #333; transform: rotateY(-5deg);">
          <div style="font-size: 28px;">🍱</div>
          <div style="font-size: 15px; font-weight: bold; color: #222; margin-top: 8px;">도시락</div>
          <div style="font-size: 11px; color: #888; margin-top: 4px;">오늘의 추천</div>
        </div>
      </div>
      <div style="margin-top: 10px; font-size: 11px; color: #888;">카드 플립 애니메이션</div>
      <button style="margin-top: 10px; background: #333; color: white; border: none; border-radius: 6px; padding: 8px 20px; font-size: 13px; cursor: pointer;">뽑기</button>
    </div>
    <div class="card-body">
      <h3>C — 카드 플립</h3>
      <p>카드가 뒤집히며 메뉴 공개. 깜짝 선물 느낌. 결과가 드라마틱하게 등장.</p>
    </div>
  </div>
</div>
